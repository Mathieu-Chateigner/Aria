<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHRleHQgeD0iMTYiIHk9IjI4IiBmb250LXNpemU9IjMwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjYzlhODRjIj7imZs8L3RleHQ+PC9zdmc+">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:         #c9a84c;
            --gold-light:   #e8c97a;
            --gold-dim:     #6b5020;
            --bg:           #111009;
            --bg2:          #1a1610;
            --bg3:          #221e14;
            --parchment:    #f0e6c8;
            --parchment-dim:#9e8e6a;
            --border:       rgba(201,168,76,0.15);
            --gm-accent:    #7b3fa0;
            --gm-dim:       #4a2560;
            --radius:       6px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--parchment);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 16px;
            gap: 48px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        .brand {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(36px, 8vw, 64px);
            color: var(--gold);
            letter-spacing: .12em;
            line-height: 1;
        }

        .tagline {
            font-family: 'EB Garamond', serif;
            font-size: clamp(14px, 3vw, 17px);
            font-style: italic;
            color: var(--parchment-dim);
            letter-spacing: .06em;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
            margin-top: 4px;
        }

        /* ── Cards ── */
        .cards {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 680px;
        }

        .card {
            flex: 1;
            min-width: 240px;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 36px 28px;
            background: var(--bg2);
            border-radius: 8px;
            text-decoration: none;
            transition: transform .18s, box-shadow .18s, border-color .18s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity .18s;
            border-radius: 8px;
        }

        .card:hover { transform: translateY(-4px); }
        .card:hover::before { opacity: 1; }

        /* Player card — gold */
        .card-player {
            border: 1px solid var(--border);
        }
        .card-player::before {
            background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.07) 0%, transparent 70%);
        }
        .card-player:hover {
            border-color: var(--gold-dim);
            box-shadow: 0 8px 32px rgba(201,168,76,.12);
        }

        /* GM card — purple */
        .card-gm {
            border: 1px solid rgba(123,63,160,.2);
        }
        .card-gm::before {
            background: radial-gradient(ellipse at 50% 0%, rgba(123,63,160,.1) 0%, transparent 70%);
        }
        .card-gm:hover {
            border-color: var(--gm-dim);
            box-shadow: 0 8px 32px rgba(123,63,160,.15);
        }

        .card-icon {
            font-size: 40px;
            line-height: 1;
        }
        .card-player .card-icon { color: var(--gold); }
        .card-gm    .card-icon { color: #c59de0; }

        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: .18em;
            text-transform: uppercase;
        }

        .card-player .card-title { color: var(--gold-light); }
        .card-gm    .card-title { color: #c59de0; }

        .card-desc {
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            color: var(--parchment-dim);
            text-align: center;
            line-height: 1.55;
        }

        .card-badge {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 4px;
        }

        .card-player .card-badge {
            background: rgba(201,168,76,.12);
            border: 1px solid var(--gold-dim);
            color: var(--gold);
        }

        .card-gm .card-badge {
            background: rgba(123,63,160,.15);
            border: 1px solid var(--gm-dim);
            color: #c59de0;
        }

        /* ── Footer ── */
        .footer {
            font-family: 'EB Garamond', serif;
            font-size: 12px;
            color: var(--parchment-dim);
            opacity: .35;
            text-align: center;
        }

        /* ── Config panel ── */
        .config-panel {
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg2);
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .config-panel-title {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--parchment-dim);
            margin-bottom: 4px;
        }
        .config-label {
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            color: var(--parchment-dim);
            margin-top: 6px;
        }
        .config-input {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--parchment);
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            padding: 8px 12px;
            width: 100%;
            transition: border-color .2s;
        }
        .config-input:focus { outline: none; border-color: var(--gold-dim); }
        .config-save-btn {
            margin-top: 8px;
            background: var(--gold-dim);
            border: none;
            border-radius: 4px;
            color: var(--bg);
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: .12em;
            padding: 10px 24px;
            cursor: pointer;
            align-self: flex-end;
            transition: background .2s;
        }
        .config-save-btn:hover { background: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">♛ ARIA</div>
        <div class="tagline">Système de jeu de rôle sur table</div>
        <div class="divider"></div>
    </div>

    <div class="cards">
        <a class="card card-player" href="views/aria-player.html">
            <div class="card-icon">⚔</div>
            <div class="card-title">Joueur</div>
            <p class="card-desc">Feuille de personnage, compétences, inventaire, cartes et alchimie.</p>
            <div class="card-badge">Ouvrir</div>
        </a>

        <a class="card card-gm" href="views/aria-gm.html">
            <div class="card-icon">👁</div>
            <div class="card-title">Maître de Jeu</div>
            <p class="card-desc">Gestion des campagnes, monstres, joueurs, cartes et alchimie.</p>
            <div class="card-badge">Ouvrir</div>
        </a>
    </div>

    <div class="config-panel">
        <div class="config-panel-title">⚙ Configuration</div>
        <label class="config-label">Clé Ably</label>
        <input class="config-input" id="cfg-ably" placeholder="xxxxxxxx:xxxxxxxx" />
        <label class="config-label">Clé API dddice</label>
        <input class="config-input" id="cfg-dddice-key" type="password" placeholder="Votre clé API…" />
        <label class="config-label">Room dddice</label>
        <input class="config-input" id="cfg-dddice-room" placeholder="slug ou URL complète" />
        <button class="config-save-btn" id="cfg-save-btn" onclick="saveConfig()">Sauvegarder</button>
    </div>

    <div class="footer">ARIA &mdash; Outil de jeu de rôle</div>

    <script>
        (function () {
            const cfg = JSON.parse(localStorage.getItem('aria-config') || '{}');
            document.getElementById('cfg-ably').value        = cfg.ablyKey    || '';
            document.getElementById('cfg-dddice-key').value  = cfg.dddiceKey  || '';
            document.getElementById('cfg-dddice-room').value = cfg.dddiceRoom || '';
        })();

        function saveConfig() {
            const cfg = JSON.parse(localStorage.getItem('aria-config') || '{}');
            cfg.ablyKey    = document.getElementById('cfg-ably').value.trim();
            cfg.dddiceKey  = document.getElementById('cfg-dddice-key').value.trim();
            cfg.dddiceRoom = document.getElementById('cfg-dddice-room').value.trim();
            localStorage.setItem('aria-config', JSON.stringify(cfg));
            const btn = document.getElementById('cfg-save-btn');
            btn.textContent = 'Sauvegardé ✓';
            setTimeout(() => { btn.textContent = 'Sauvegarder'; }, 1500);
        }
    </script>
</body>
</html>
