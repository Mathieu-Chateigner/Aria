<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ARIA – Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: #6b5020;
  --parchment: #f0e6c8;
  --success:      #4caf77;
  --success-crit: #a8ff78;
  --fail:         #c0392b;
  --fail-crit:    #ff4444;
  --card-red:    #c0392b;
  --card-black:  #1a1a1a;
  --card-cream:  #f5f0e8;
  --card-purple: #7b3fa0;
  --card-navy:   #1b3a6b;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: transparent;
  font-family: 'EB Garamond', serif;
  width: 100vw; height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── WAITING (GM only) ── */
#waiting { display:none; flex-direction:column; align-items:center; gap:10px; opacity:0.25; }
#waiting.show { display:flex; }
.wait-crown { font-size:28px; animation:breathe 3s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:0.4;transform:scale(1);}50%{opacity:0.9;transform:scale(1.08);} }
.wait-text { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold-dim); }

/* ── PARTICLES ── */
#particles { position:fixed; inset:0; pointer-events:none; z-index:5; }

/* ══════════════════════════════
   DICE ROLL CARD
══════════════════════════════ */
#roll-card {
  display:none; flex-direction:column; align-items:center;
  background:linear-gradient(150deg,#1c1609 0%,#0e0c07 100%);
  border:1px solid var(--gold-dim);
  box-shadow:0 0 0 1px rgba(201,168,76,0.08),0 0 50px rgba(201,168,76,0.12),0 24px 80px rgba(0,0,0,0.85);
  padding:40px 72px 48px; position:relative; min-width:400px; text-align:center; z-index:10;
}
#roll-card.show { display:flex; animation:cardReveal 0.4s cubic-bezier(0.34,1.4,0.64,1); }
#roll-card.crit-success {
  border-color:var(--success-crit);
  box-shadow:0 0 0 1px rgba(168,255,120,0.25),0 0 60px rgba(168,255,120,0.3),0 24px 80px rgba(0,0,0,0.85);
  animation:cardReveal 0.4s cubic-bezier(0.34,1.4,0.64,1),glowPulseGreen 1.6s 0.5s ease-in-out infinite;
}
#roll-card.crit-fail {
  border-color:var(--fail-crit);
  box-shadow:0 0 0 1px rgba(255,68,68,0.3),0 0 60px rgba(255,68,68,0.35),0 24px 80px rgba(0,0,0,0.85);
  animation:cardReveal 0.4s cubic-bezier(0.34,1.4,0.64,1),shakeCard 0.45s 0.4s ease-in-out,glowPulseRed 1.4s 1s ease-in-out infinite;
}
@keyframes cardReveal { from{opacity:0;transform:scale(0.65) translateY(24px);}to{opacity:1;transform:scale(1) translateY(0);} }
@keyframes shakeCard  { 0%,100%{transform:translateX(0);}20%{transform:translateX(-9px) rotate(-1deg);}40%{transform:translateX(9px) rotate(1deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);} }
@keyframes glowPulseGreen { 0%,100%{box-shadow:0 0 0 1px rgba(168,255,120,0.25),0 0 60px rgba(168,255,120,0.3),0 24px 80px rgba(0,0,0,0.85);}50%{box-shadow:0 0 0 2px rgba(168,255,120,0.45),0 0 90px rgba(168,255,120,0.55),0 24px 80px rgba(0,0,0,0.85);} }
@keyframes glowPulseRed   { 0%,100%{box-shadow:0 0 0 1px rgba(255,68,68,0.3),0 0 60px rgba(255,68,68,0.35),0 24px 80px rgba(0,0,0,0.85);}50%{box-shadow:0 0 0 2px rgba(255,68,68,0.5),0 0 90px rgba(255,68,68,0.6),0 24px 80px rgba(0,0,0,0.85);} }

#roll-card::before { content:''; position:absolute; top:6px;left:6px;right:6px;bottom:6px; border:1px solid rgba(201,168,76,0.07); pointer-events:none; }
.corner { position:absolute; width:16px;height:16px; border-color:var(--gold-dim); border-style:solid; border-width:0; }
.corner.tl{top:8px;left:8px;border-top-width:1px;border-left-width:1px;}
.corner.tr{top:8px;right:8px;border-top-width:1px;border-right-width:1px;}
.corner.bl{bottom:8px;left:8px;border-bottom-width:1px;border-left-width:1px;}
.corner.br{bottom:8px;right:8px;border-bottom-width:1px;border-right-width:1px;}

.card-char  { font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:10px; }
.card-skill { font-family:'Playfair Display',serif; font-size:22px; font-style:italic; color:var(--parchment); margin-bottom:20px; max-width:320px; line-height:1.3; }

.card-roll { font-family:'Cinzel Decorative',serif; font-size:80px; font-weight:700; color:var(--parchment); line-height:1; text-shadow:0 0 30px rgba(240,230,200,0.2); margin-bottom:4px; animation:rollIn 0.45s cubic-bezier(0.22,1.5,0.5,1); }
.crit-success .card-roll { color:var(--success-crit); text-shadow:0 0 20px rgba(168,255,120,0.7),0 0 50px rgba(168,255,120,0.3); animation:rollIn 0.45s cubic-bezier(0.22,1.5,0.5,1),numberGlowGreen 1.4s 0.6s ease-in-out infinite alternate; }
.crit-fail    .card-roll { color:var(--fail-crit);    text-shadow:0 0 20px rgba(255,68,68,0.7),0 0 50px rgba(255,68,68,0.3);     animation:rollIn 0.45s cubic-bezier(0.22,1.5,0.5,1),numberGlowRed   1.2s 0.6s ease-in-out infinite alternate; }
@keyframes rollIn         { from{opacity:0;transform:scale(1.5) rotate(-8deg);}to{opacity:1;transform:scale(1) rotate(0);} }
@keyframes numberGlowGreen{ from{filter:brightness(1);}to{filter:brightness(1.4) drop-shadow(0 0 10px rgba(168,255,120,0.9));} }
@keyframes numberGlowRed  { from{filter:brightness(1);}to{filter:brightness(1.4) drop-shadow(0 0 10px rgba(255,68,68,0.9));} }

.card-divider { width:80px;height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin:14px auto; }

.card-verdict { font-family:'Cinzel',serif; font-weight:900; letter-spacing:0.18em; animation:verdictIn 0.35s 0.18s both ease-out; }
@keyframes verdictIn { from{opacity:0;transform:translateY(12px) scale(0.9);}to{opacity:1;transform:translateY(0) scale(1);} }
.verdict-success      { font-size:30px; color:var(--success);      text-shadow:0 0 24px rgba(76,175,119,0.55); }
.verdict-fail         { font-size:30px; color:var(--fail);          text-shadow:0 0 24px rgba(192,57,43,0.55); }
.verdict-crit-success { font-size:24px; color:var(--success-crit); text-shadow:0 0 20px rgba(168,255,120,0.9),0 0 45px rgba(168,255,120,0.4); animation:verdictIn 0.35s 0.18s both ease-out,critFlicker 1.5s 0.8s ease-in-out infinite alternate; }
.verdict-crit-fail    { font-size:24px; color:var(--fail-crit);    text-shadow:0 0 20px rgba(255,68,68,0.9),0 0 45px rgba(255,68,68,0.4);     animation:verdictIn 0.35s 0.18s both ease-out,critFlicker 1.2s 0.8s ease-in-out infinite alternate; }
@keyframes critFlicker { from{filter:brightness(1);opacity:1;}to{filter:brightness(1.35);opacity:0.88;} }

.card-crit-sub { font-family:'EB Garamond',serif; font-style:italic; font-size:12px; letter-spacing:0.12em; margin-top:6px; opacity:0; animation:subIn 0.5s 0.6s both ease-out; }
.crit-success .card-crit-sub { color:rgba(168,255,120,0.55); }
.crit-fail    .card-crit-sub { color:rgba(255,100,100,0.55); }
@keyframes subIn { from{opacity:0;letter-spacing:0.3em;}to{opacity:1;letter-spacing:0.12em;} }

.card-bonus { font-size:11px; color:var(--gold-dim); font-style:italic; margin-top:8px; letter-spacing:0.05em; }

/* ══════════════════════════════
   DRAWN PLAYING CARD OVERLAY
══════════════════════════════ */
#drawn-card-overlay {
  display: none;
  position: relative;
  z-index: 10;
}
#drawn-card-overlay.show {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  animation: cardReveal 0.45s cubic-bezier(0.34,1.4,0.64,1);
}

/* the playing card itself */
.play-card {
  width: 200px; height: 280px;
  border-radius: 16px;
  background: var(--card-cream);
  border: 2px solid #d4c9b0;
  box-shadow: 0 12px 50px rgba(0,0,0,0.8), 0 3px 10px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
  font-family: 'Playfair Display', serif;
}
.play-card::before { content:''; position:absolute; inset:8px; border:1px solid currentColor; border-radius:10px; opacity:0.08; pointer-events:none; }
.play-card .pc-corner { position:absolute; display:flex; flex-direction:column; align-items:center; line-height:1; font-weight:700; }
.play-card .pc-rank       { font-size:32px; }
.play-card .pc-suit-small { font-size:25px; }
.play-card .pc-corner.tl { top:12px; left:16px; }
.play-card .pc-corner.br { bottom:12px; right:16px; transform:rotate(180deg); }
.play-card .pc-center { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:90px; line-height:1; }

.pc-red    { color:var(--card-red); }
.pc-black  { color:var(--card-black); }
.pc-purple { color:var(--card-purple); }

/* label under the card */
.drawn-card-label {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--gold-dim);
  text-transform: uppercase;
}
/* ══════════════════════════════════════════
   DAMAGE OVERLAY
   ══════════════════════════════════════════ */

/* full-screen vignette flash */
#dmg-vignette {
  pointer-events: none;
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(160,0,0,0.0) 100%);
  z-index: 200;
  opacity: 0;
}
#dmg-vignette.flash {
  animation: vignetteFlash 0.9s ease-out forwards;
}
@keyframes vignetteFlash {
  0%   { opacity:0; background: radial-gradient(ellipse at center, transparent 30%, rgba(180,0,0,0.85) 100%); }
  15%  { opacity:1; }
  100% { opacity:0; }
}

/* blood splatter particles canvas */
#dmg-canvas {
  pointer-events: none;
  position: fixed; inset: 0;
  z-index: 201;
}

/* big damage number */
#dmg-number {
  pointer-events: none;
  position: fixed;
  top: 22%; left: 50%;
  transform: translateX(-50%);
  z-index: 202;
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  font-size: 110px;
  color: #ff2222;
  text-shadow:
    0 0 20px rgba(255,30,30,0.9),
    0 0 50px rgba(200,0,0,0.6),
    3px 3px 0 #1a0000,
    6px 6px 0 rgba(0,0,0,0.4);
  opacity: 0;
  white-space: nowrap;
  line-height: 1;
}
#dmg-number.show {
  animation: dmgNumberAnim 1.8s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes dmgNumberAnim {
  0%   { opacity:0;   transform:translateX(-50%) translateY(-60px) scale(1.6) rotate(-4deg); }
  12%  { opacity:1;   transform:translateX(-50%) translateY(8px) scale(0.92) rotate(1deg); }
  22%  { opacity:1;   transform:translateX(-50%) translateY(-4px) scale(1.03) rotate(-0.5deg); }
  30%  { opacity:1;   transform:translateX(-50%) scale(1) rotate(0); }
  70%  { opacity:1;   transform:translateX(-50%) scale(1); }
  100% { opacity:0;   transform:translateX(-50%) translateY(20px) scale(0.8); }
}

/* HP bar */
#dmg-hpbar-wrap {
  pointer-events: none;
  position: fixed;
  bottom: 60px; left: 50%;
  transform: translateX(-50%);
  z-index: 202;
  width: 420px;
  opacity: 0;
}
#dmg-hpbar-wrap.show {
  animation: hpBarFadeIn 0.4s 0.3s ease-out forwards, hpBarFadeOut 0.5s 4s ease-in forwards;
}
@keyframes hpBarFadeIn  { from{opacity:0;transform:translateX(-50%) translateY(14px);}to{opacity:1;transform:translateX(-50%) translateY(0);} }
@keyframes hpBarFadeOut { from{opacity:1;}to{opacity:0;} }

.dmg-char-name {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(240,230,200,0.6);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 6px;
}
.dmg-hpbar-track {
  position: relative;
  height: 22px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  overflow: hidden;
}
.dmg-hpbar-ghost {
  position: absolute; inset: 0;
  background: rgba(200,80,80,0.35);
  border-radius: 3px;
  /* width set by JS = old HP % */
}
.dmg-hpbar-fill {
  position: absolute; top:0; bottom:0; left:0;
  border-radius: 3px;
  transition: width 1.1s cubic-bezier(0.4,0,0.2,1);
  /* width set by JS = new HP % */
}
.dmg-hpbar-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 12px; font-weight: 700;
  color: #fff;
  letter-spacing: 0.1em;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
}

/* screen shake — applied to body */
@keyframes screenShake {
  0%,100% { transform: translate(0,0) rotate(0); }
  10%  { transform: translate(-8px,-5px) rotate(-0.4deg); }
  20%  { transform: translate(9px,4px)  rotate(0.3deg); }
  30%  { transform: translate(-7px,6px) rotate(-0.2deg); }
  40%  { transform: translate(6px,-7px) rotate(0.4deg); }
  50%  { transform: translate(-5px,5px) rotate(-0.3deg); }
  60%  { transform: translate(7px,-4px) rotate(0.2deg); }
  70%  { transform: translate(-6px,3px) rotate(-0.1deg); }
  80%  { transform: translate(4px,-2px); }
  90%  { transform: translate(-2px,1px); }
}
body.shake { animation: screenShake 0.55s cubic-bezier(0.36,0.07,0.19,0.97) both; }

/* MORT overlay */
#dmg-mort {
  pointer-events: none;
  position: fixed; inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
  opacity: 0;
}
#dmg-mort.show {
  animation: mortReveal 3s ease-out forwards;
}
@keyframes mortReveal {
  0%   { opacity:0; background:rgba(0,0,0,0); }
  20%  { opacity:1; background:rgba(0,0,0,0.85); }
  80%  { opacity:1; background:rgba(0,0,0,0.85); }
  100% { opacity:0; }
}
.mort-skull  { font-size:80px; animation: mortSkull 3s ease-out forwards; }
@keyframes mortSkull { 0%{transform:scale(0) rotate(-20deg);opacity:0;}20%{transform:scale(1.1) rotate(4deg);opacity:1;}30%{transform:scale(1);}100%{transform:scale(1);} }
.mort-text   { font-family:'Cinzel Decorative',serif; font-size:42px; color:#cc1111; letter-spacing:0.2em; text-shadow: 0 0 30px rgba(200,0,0,0.8); animation: mortText 3s ease-out forwards; }
@keyframes mortText { 0%{opacity:0;letter-spacing:0.6em;}15%{opacity:1;letter-spacing:0.2em;}80%{opacity:1;}100%{opacity:0;} }
.mort-sub    { font-family:'EB Garamond',serif; font-style:italic; font-size:18px; color:rgba(240,200,200,0.6); letter-spacing:0.15em; animation: mortSub 3s ease-out forwards; }
@keyframes mortSub  { 0%,10%{opacity:0;}25%{opacity:1;}80%{opacity:1;}100%{opacity:0;} }

/* heal number */
#heal-number {
  pointer-events: none;
  position: fixed;
  top: 28%; left: 50%;
  transform: translateX(-50%);
  z-index: 202;
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  font-size: 72px;
  color: #4cff88;
  text-shadow: 0 0 20px rgba(76,255,136,0.8), 0 0 50px rgba(76,200,100,0.5), 2px 2px 0 #001a0a;
  opacity: 0;
  white-space: nowrap;
}
#heal-number.show {
  animation: healAnim 1.6s ease-out forwards;
}
@keyframes healAnim {
  0%  { opacity:0; transform:translateX(-50%) translateY(20px) scale(0.7); }
  15% { opacity:1; transform:translateX(-50%) translateY(-8px) scale(1.05); }
  25% { transform:translateX(-50%) scale(1); }
  70% { opacity:1; }
  100%{ opacity:0; transform:translateX(-50%) translateY(-30px); }
}

</style>
</head>
<body>

<!-- damage fx -->
<div id="dmg-vignette"></div>
<canvas id="dmg-canvas"></canvas>
<div id="dmg-number"></div>
<div id="heal-number"></div>
<div id="dmg-hpbar-wrap">
  <div class="dmg-char-name" id="dmg-char-name"></div>
  <div class="dmg-hpbar-track">
    <div class="dmg-hpbar-ghost" id="dmg-hpbar-ghost"></div>
    <div class="dmg-hpbar-fill"  id="dmg-hpbar-fill"></div>
    <div class="dmg-hpbar-text"  id="dmg-hpbar-text"></div>
  </div>
</div>
<div id="dmg-mort">
  <div class="mort-skull">💀</div>
  <div class="mort-text">MORT</div>
  <div class="mort-sub" id="mort-char-name"></div>
</div>

<canvas id="particles"></canvas>

<div id="waiting">
  <div class="wait-crown">♛</div>
  <div class="wait-text">En attente d'un jet…</div>
</div>

<!-- DICE ROLL CARD -->
<div id="roll-card">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="card-char"     id="card-char"></div>
  <div class="card-skill"    id="card-skill"></div>
  <div class="card-roll"     id="card-roll"></div>
  <div class="card-divider"></div>
  <div class="card-verdict"  id="card-verdict"></div>
  <div class="card-crit-sub" id="card-crit-sub"></div>
  <div class="card-bonus"    id="card-bonus"></div>
</div>

<!-- DRAWN PLAYING CARD -->
<div id="drawn-card-overlay">
  <div class="play-card" id="play-card"></div>
  <div class="drawn-card-label" id="drawn-card-label"></div>
</div>

<script>
const params   = new URLSearchParams(window.location.search);
const MODE     = params.get('mode') || 'gm';
const ABLY_KEY = params.get('ably') || '';

let rollDismiss = null;
let cardDismiss = null;

if (MODE === 'gm') document.getElementById('waiting').classList.add('show');

// ── ABLY ──────────────────────────────────
if (ABLY_KEY) {
  const ably = new Ably.Realtime({ key: ABLY_KEY });

  // Dice rolls
  const rollCh = ably.channels.get('aria-rolls');
  // Dice rolls — wait 3s for the 3D dice animation to finish before showing the result card
  rollCh.subscribe('roll', msg => setTimeout(() => showRoll(msg.data), 3000));

  // Card draws
  const cardCh = ably.channels.get('aria-cards');
  cardCh.subscribe('draw',     msg => showDrawnCard(msg.data));
  cardCh.subscribe('reshuffle',msg => showReshuffle());

  // Damage
  const dmgCh = ably.channels.get('aria-damage');
  dmgCh.subscribe('damage', msg => showDamage(msg.data));
  dmgCh.subscribe('heal',   msg => showHeal(msg.data));
} else {
  console.warn('No Ably key. Pass ?ably=YOUR_KEY in the URL.');
}

// ══════════════════════════════════════════
//  DICE ROLL DISPLAY
// ══════════════════════════════════════════
function classify(roll, success) {
  if (roll >= 1  && roll <= 10)  return 'crit-success';
  if (roll >= 91 && roll <= 100) return 'crit-fail';
  return success ? 'success' : 'fail';
}

function showRoll(data) {
  // Hide card overlay if visible
  hideCard();

  const rollCard = document.getElementById('roll-card');
  const waiting  = document.getElementById('waiting');
  const type     = classify(data.roll, data.success);

  rollCard.className = '';
  stopParticles();

  document.getElementById('card-char').textContent  = data.char || '';
  document.getElementById('card-skill').textContent = data.skillName;
  document.getElementById('card-roll').textContent  = data.roll;

  const bm = data.bonusMalus && data.bonusMalus !== 0
    ? `(Modificateur : ${data.bonusMalus > 0 ? '+' : ''}${data.bonusMalus})` : '';
  document.getElementById('card-bonus').textContent = bm;

  const verdictEl = document.getElementById('card-verdict');
  const subEl     = document.getElementById('card-crit-sub');
  subEl.textContent = '';

  switch(type) {
    case 'crit-success':
      verdictEl.textContent = 'SUCCÈS CRITIQUE';
      verdictEl.className   = 'card-verdict verdict-crit-success';
      subEl.textContent     = '✦ les dieux sourient ✦';
      rollCard.classList.add('crit-success');
      spawnParticles('success');
      break;
    case 'crit-fail':
      verdictEl.textContent = 'ÉCHEC CRITIQUE';
      verdictEl.className   = 'card-verdict verdict-crit-fail';
      subEl.textContent     = '✦ les dieux se détournent ✦';
      rollCard.classList.add('crit-fail');
      spawnParticles('fail');
      break;
    case 'success':
      verdictEl.textContent = 'SUCCÈS';
      verdictEl.className   = 'card-verdict verdict-success';
      break;
    case 'fail':
      verdictEl.textContent = 'ÉCHEC';
      verdictEl.className   = 'card-verdict verdict-fail';
      break;
  }

  waiting.classList.remove('show');
  void rollCard.offsetWidth;
  rollCard.classList.add('show');

  const dur = (type === 'crit-success' || type === 'crit-fail') ? 8000 : 6000;
  clearTimeout(rollDismiss);
  rollDismiss = setTimeout(() => {
    rollCard.className = '';
    stopParticles();
    if (MODE === 'gm') setTimeout(() => waiting.classList.add('show'), 300);
  }, dur);
}

// ══════════════════════════════════════════
//  PLAYING CARD DISPLAY
// ══════════════════════════════════════════
const SUITS_MAP = {
  spades:   { sym:'♠', cls:'pc-black' },
  clubs:    { sym:'♣', cls:'pc-black' },
  hearts:   { sym:'♥', cls:'pc-red'   },
  diamonds: { sym:'♦', cls:'pc-red'   },
  joker:    { sym:'★', cls:'pc-purple'},
};

function buildPlayingCard(cardId) {
  // Reconstruct card info from id
  const isJoker = cardId.startsWith('joker');
  let html = '', label = '', colorCls = '';

  if (isJoker) {
    const isRed = cardId === 'joker-red';
    colorCls = isRed ? 'pc-red' : 'pc-black';
    label    = isRed ? 'Joker Rouge' : 'Joker Noir';
    html = `
      <div class="pc-corner tl"><span class="pc-rank" style="font-size:20px;color:var(--card-purple)">JKR</span></div>
      <div class="pc-center" style="flex-direction:column;gap:10px;">
        <span style="font-size:75px;line-height:1;color:var(--card-purple)">★</span>
        <span style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;letter-spacing:.14em;color:var(--card-purple)">${label.toUpperCase()}</span>
      </div>
      <div class="pc-corner br"><span class="pc-rank" style="font-size:20px;color:var(--card-purple)">JKR</span></div>`;
  } else {
    const parts = cardId.split('-');
    const rank  = parts[0];
    const suitName = parts.slice(1).join('-');
    const suit  = SUITS_MAP[suitName] || { sym:'?', cls:'pc-black' };
    colorCls = suit.cls;
    const suitNames = { spades:'Pique', clubs:'Trèfle', hearts:'Cœur', diamonds:'Carreau' };
    label = `${rank} de ${suitNames[suitName] || suitName}`;
    html = `
      <div class="pc-corner tl"><span class="pc-rank">${rank}</span><span class="pc-suit-small">${suit.sym}</span></div>
      <div class="pc-center">${suit.sym}</div>
      <div class="pc-corner br"><span class="pc-rank">${rank}</span><span class="pc-suit-small">${suit.sym}</span></div>`;
  }
  return { html, label, colorCls };
}

function showDrawnCard(data) {
  // Hide dice roll if visible
  hideRoll();

  const overlay = document.getElementById('drawn-card-overlay');
  const cardEl  = document.getElementById('play-card');
  const labelEl = document.getElementById('drawn-card-label');
  const waiting = document.getElementById('waiting');

  const { html, label, colorCls } = buildPlayingCard(data.cardId);
  cardEl.className = `play-card ${colorCls}`;
  cardEl.innerHTML = html;
  labelEl.textContent = label;

  waiting.classList.remove('show');
  overlay.classList.remove('show');
  void overlay.offsetWidth;
  overlay.classList.add('show');

  clearTimeout(cardDismiss);
  cardDismiss = setTimeout(() => {
    hideCard();
    if (MODE === 'gm') setTimeout(() => waiting.classList.add('show'), 300);
  }, 7000);
}

function showReshuffle() {
  // Just briefly flash something on overlay if you want — for now, just hide card
  hideCard();
}

function hideRoll() {
  const rc = document.getElementById('roll-card');
  rc.className = '';
  stopParticles();
  clearTimeout(rollDismiss);
}

function hideCard() {
  document.getElementById('drawn-card-overlay').classList.remove('show');
  clearTimeout(cardDismiss);
}

// ══════════════════════════════════════════
//  PARTICLE SYSTEM
// ══════════════════════════════════════════
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
let particles = [], animFrame = null;

function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function spawnParticles(type) {
  particles = [];
  const cx=canvas.width/2, cy=canvas.height/2;
  for(let i=0;i<70;i++){
    const angle=Math.random()*Math.PI*2, speed=2.5+Math.random()*5.5;
    let hue,sat,lit;
    if(type==='success'){hue=Math.random()>0.45?110+Math.random()*30:42+Math.random()*15;sat=80+Math.random()*20;lit=55+Math.random()*35;}
    else{hue=Math.random()>0.4?Math.random()*15:18+Math.random()*12;sat=85+Math.random()*15;lit=45+Math.random()*35;}
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-1.5,r:2.5+Math.random()*4,color:`hsl(${hue},${sat}%,${lit}%)`,alpha:1,gravity:0.1+Math.random()*0.1,decay:0.011+Math.random()*0.014,star:Math.random()>0.55});
  }
  if(animFrame) cancelAnimationFrame(animFrame);
  loopParticles();
}
function loopParticles() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.alpha>0.02);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.alpha-=p.decay;
    ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;ctx.translate(p.x,p.y);
    if(p.star){drawStar(ctx,p.r);}else{ctx.beginPath();ctx.arc(0,0,p.r/2,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  if(particles.length) animFrame=requestAnimationFrame(loopParticles);
  else{ctx.clearRect(0,0,canvas.width,canvas.height);animFrame=null;}
}
function drawStar(ctx,r){const spikes=4,out=r/2,inn=r/5;let rot=-Math.PI/2;ctx.beginPath();for(let i=0;i<spikes*2;i++){const radius=i%2===0?out:inn;ctx.lineTo(Math.cos(rot)*radius,Math.sin(rot)*radius);rot+=Math.PI/spikes;}ctx.closePath();ctx.fill();}
function stopParticles(){if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}ctx.clearRect(0,0,canvas.width,canvas.height);particles=[];}

// ══════════════════════════════════════════
//  BLOOD PARTICLE SYSTEM
// ══════════════════════════════════════════
const dmgCanvas = document.getElementById('dmg-canvas');
const dmgCtx    = dmgCanvas.getContext('2d');
let bloodParticles = [], bloodFrame = null;

function resizeDmgCanvas() { dmgCanvas.width=window.innerWidth; dmgCanvas.height=window.innerHeight; }
resizeDmgCanvas();
window.addEventListener('resize', resizeDmgCanvas);

function spawnBlood(count) {
  const cx = window.innerWidth  * (0.3 + Math.random()*0.4);
  const cy = window.innerHeight * (0.15 + Math.random()*0.25);
  const colors = ['#cc0000','#990000','#ff2222','#880000','#dd1111','#aa0000'];
  for(let i=0;i<count;i++) {
    const angle  = Math.random() * Math.PI * 2;
    const speed  = 2 + Math.random() * 10;
    const isBlob = Math.random() < 0.4;
    bloodParticles.push({
      x: cx + (Math.random()-0.5)*60,
      y: cy + (Math.random()-0.5)*30,
      vx: Math.cos(angle) * speed * (0.5 + Math.random()),
      vy: Math.sin(angle) * speed - 4 - Math.random()*6,
      gravity: 0.35 + Math.random()*0.2,
      r: isBlob ? 6+Math.random()*14 : 2+Math.random()*5,
      alpha: 0.85 + Math.random()*0.15,
      decay: 0.008 + Math.random()*0.012,
      color: colors[Math.floor(Math.random()*colors.length)],
      blob: isBlob,
      rot: Math.random()*Math.PI*2,
      rotV: (Math.random()-0.5)*0.2,
    });
  }
  if(!bloodFrame) loopBlood();
}

function loopBlood() {
  dmgCtx.clearRect(0,0,dmgCanvas.width,dmgCanvas.height);
  bloodParticles = bloodParticles.filter(p=>p.alpha>0.01);
  for(const p of bloodParticles) {
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity;
    p.vx*=0.98; p.alpha-=p.decay; p.rot+=p.rotV;
    dmgCtx.save();
    dmgCtx.globalAlpha = Math.max(0,p.alpha);
    dmgCtx.fillStyle   = p.color;
    dmgCtx.shadowColor = p.color;
    dmgCtx.shadowBlur  = p.blob ? 12 : 4;
    dmgCtx.translate(p.x,p.y); dmgCtx.rotate(p.rot);
    if(p.blob) {
      dmgCtx.beginPath();
      dmgCtx.ellipse(0,0,p.r,p.r*0.6,0,0,Math.PI*2);
    } else {
      dmgCtx.beginPath();
      dmgCtx.arc(0,0,p.r,0,Math.PI*2);
    }
    dmgCtx.fill();
    dmgCtx.restore();
  }
  if(bloodParticles.length) bloodFrame=requestAnimationFrame(loopBlood);
  else { dmgCtx.clearRect(0,0,dmgCanvas.width,dmgCanvas.height); bloodFrame=null; }
}

// ══════════════════════════════════════════
//  DAMAGE / HEAL DISPLAY
// ══════════════════════════════════════════
let dmgTimer = null;

function showDamage(data) {
  clearTimeout(dmgTimer);

  const isDead = data.hpAfter <= 0;

  // 1 — screen shake
  document.body.classList.remove('shake');
  void document.body.offsetWidth; // reflow to restart animation
  document.body.classList.add('shake');
  setTimeout(()=>document.body.classList.remove('shake'), 600);

  // 2 — red vignette
  const vig = document.getElementById('dmg-vignette');
  vig.classList.remove('flash');
  void vig.offsetWidth;
  vig.classList.add('flash');

  // 3 — blood particles
  spawnBlood(isDead ? 80 : 45);

  // 4 — damage number
  const numEl = document.getElementById('dmg-number');
  numEl.textContent = '-' + data.damage;
  numEl.classList.remove('show');
  void numEl.offsetWidth;
  numEl.classList.add('show');

  // 5 — HP bar
  const max       = data.maxHP || 1;
  const pctBefore = Math.max(0, Math.min(100, (data.hpBefore / max) * 100));
  const pctAfter  = Math.max(0, Math.min(100, (data.hpAfter  / max) * 100));

  const wrap  = document.getElementById('dmg-hpbar-wrap');
  const ghost = document.getElementById('dmg-hpbar-ghost');
  const fill  = document.getElementById('dmg-hpbar-fill');
  const text  = document.getElementById('dmg-hpbar-text');
  const name  = document.getElementById('dmg-char-name');

  name.textContent    = data.charName || '';
  ghost.style.width   = pctBefore + '%';
  fill.style.width    = pctBefore + '%'; // start at old value
  fill.style.transition = 'none';

  // colour the fill
  const fillColor = pctAfter > 60 ? 'linear-gradient(90deg,#1a5c2a,#2e8b57)'
                  : pctAfter > 30 ? 'linear-gradient(90deg,#7a5500,#c8960a)'
                  :                 'linear-gradient(90deg,#7b1a1a,#c0392b)';
  fill.style.background = fillColor;
  text.textContent = `${data.hpAfter} / ${max} PV`;

  wrap.classList.remove('show');
  void wrap.offsetWidth;
  wrap.classList.add('show');

  // drain animation — brief delay so the ghost is visible first
  setTimeout(()=>{
    fill.style.transition = 'width 1.1s cubic-bezier(0.4,0,0.2,1)';
    fill.style.width = pctAfter + '%';
  }, 80);

  // 6 — mort screen if HP = 0
  if(isDead) {
    const mort = document.getElementById('dmg-mort');
    document.getElementById('mort-char-name').textContent = data.charName || '';
    setTimeout(()=>{
      mort.classList.remove('show');
      void mort.offsetWidth;
      mort.classList.add('show');
    }, 600);
    dmgTimer = setTimeout(()=>{
      mort.classList.remove('show');
    }, 4200);
  } else {
    dmgTimer = setTimeout(()=>{
      numEl.classList.remove('show');
      wrap.classList.remove('show');
    }, 4600);
  }
}

function showHeal(data) {
  clearTimeout(dmgTimer);

  const max      = data.maxHP || 1;
  const pctAfter = Math.max(0, Math.min(100,(data.hpAfter/max)*100));

  // green number
  const numEl = document.getElementById('heal-number');
  numEl.textContent = '+' + data.amount;
  numEl.classList.remove('show');
  void numEl.offsetWidth;
  numEl.classList.add('show');

  // HP bar (reuse damage bar, but animate upward)
  const wrap  = document.getElementById('dmg-hpbar-wrap');
  const ghost = document.getElementById('dmg-hpbar-ghost');
  const fill  = document.getElementById('dmg-hpbar-fill');
  const text  = document.getElementById('dmg-hpbar-text');
  const name  = document.getElementById('dmg-char-name');

  name.textContent  = data.charName || '';
  ghost.style.width = Math.max(0,Math.min(100,(data.hpBefore/max)*100)) + '%';
  ghost.style.background = 'rgba(76,175,119,0.25)'; // green ghost for heal
  fill.style.transition = 'none';
  fill.style.width   = ghost.style.width;
  fill.style.background = 'linear-gradient(90deg,#1a5c2a,#2e8b57)';
  text.textContent = `${data.hpAfter} / ${max} PV`;

  wrap.classList.remove('show');
  void wrap.offsetWidth;
  wrap.classList.add('show');

  setTimeout(()=>{
    fill.style.transition = 'width 1.1s cubic-bezier(0.4,0,0.2,1)';
    fill.style.width = pctAfter + '%';
  }, 80);

  dmgTimer = setTimeout(()=>{
    numEl.classList.remove('show');
    wrap.classList.remove('show');
    ghost.style.background = ''; // reset
  }, 4200);
}
</script>
